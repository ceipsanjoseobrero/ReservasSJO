<script>
// Función global para actualizar la clave maestra (se mantiene)
window.actualizarPassword = function(nuevaPass) {
  if(!nuevaPass) return alert("Escribe una contraseña");
  window._fbDb.ref('passwordMaestros').set(nuevaPass)
    .then(() => alert("✅ Contraseña actualizada globalmente en tiempo real"))
    .catch((e) => alert("Error: " + e.message));
};
</script>
