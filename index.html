<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CEIP San José Obrero — Reservas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>

<!-- Firebase CDN v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<style>
body{margin:0;font-family:system-ui,sans-serif;background:linear-gradient(135deg,#eff6ff,#f5f3ff);min-height:100vh;}
.scroll-x{overflow-x:auto;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect} = React;

// ==================== FIREBASE ====================
const firebaseConfig = {
  apiKey: "AIzaSyD6CSmUdL7BfGaa7Pwxtswdw8w07TnjAA",
  authDomain: "ceip-sjo-reservas.firebaseapp.com",
  databaseURL: "https://ceip-sjo-reservas-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ceip-sjo-reservas",
  storageBucket: "ceip-sjo-reservas.firebasestorage.app",
  messagingSenderId: "448340997755",
  appId: "1:448340997755:web:995fc7cc6f76215a70d4de"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
// ==================== FIN FIREBASE ====================

// === Tus constantes originales ===
const ADMIN_PASSWORD = "biblioflix2024";
const INITIAL_RESOURCES = [
  {id:"informatica",name:"Aula de Informática",icon:"🖥️",units:1,color:"#6366f1"},
  {id:"proyector",name:"Proyector Móvil",icon:"📽️",units:1,color:"#f59e0b"},
  {id:"tablets",name:"Tablets / iPads",icon:"📱",units:15,color:"#10b981"},
  {id:"biblioteca",name:"Biblioteca",icon:"📚",units:1,color:"#8b5cf6"},
  {id:"portatiles",name:"Portátiles",icon:"💻",units:20,color:"#3b82f6"},
  {id:"matinal",name:"Aula Matinal",icon:"🌅",units:1,color:"#ec4899"},
];

const HOURS = ["8:00","9:00","10:00","11:00","11:30","12:30","13:30","14:30"];
const HOUR_LABELS = ["8:00","9:00","10:00","11:00","RECREO","11:30","12:30","13:30","14:30"];
const DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
// ... (todas las demás constantes que tenías: MONTHS, COLORS, etc.)

// === Funciones auxiliares (getSchoolYear, dKey, etc.) === 
// (mantengo las que ya tenías en tu versión actual)

// === Función App con Firebase ===
function App() {
  // Todos tus useState originales aquí...

  // Sincronización en tiempo real
  useEffect(() => {
    const resRef = db.ref('reservations');
    const blockRef = db.ref('blockedDays');
    const resouRef = db.ref('resources');

    resRef.on('value', snap => setReservations(snap.val() || {}));
    blockRef.on('value', snap => setBlockedDays(snap.val() || {}));
    resouRef.on('value', snap => {
      const data = snap.val();
      if (!data || data.length === 0) {
        resouRef.set(INITIAL_RESOURCES);
        setResources(INITIAL_RESOURCES);
      } else {
        setResources(data);
      }
    });

    return () => { resRef.off(); blockRef.off(); resouRef.off(); };
  }, []);

  // Funciones de guardado
  const saveReservations = (newRes) => { db.ref('reservations').set(newRes); setReservations(newRes); };
  const saveBlockedDays = (newBlocked) => { db.ref('blockedDays').set(newBlocked); setBlockedDays(newBlocked); };
  const saveResources = (newRes) => { db.ref('resources').set(newRes); setResources(newRes); };

  // El resto de tu lógica original (modal, crear reserva, admin, etc.) se mantiene igual.
  // Solo cambia las líneas que guardaban en localStorage por las de arriba.

  return React.createElement('div', {className: "p-6 max-w-7xl mx-auto"},
    React.createElement('h1', {className: "text-4xl font-bold text-center text-indigo-700 mb-2"}, "Reservas CEIP San José Obrero"),
    React.createElement('p', {className: "text-center text-green-600 font-medium mb-8"}, "✅ Sincronizado en tiempo real con Firebase")
    // Aquí va todo tu JSX original
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
