<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEIP San José Obrero — Reservas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  body { margin:0; font-family:system-ui; background:linear-gradient(135deg,#eff6ff,#f5f3ff); min-height:100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

firebase.initializeApp({
  apiKey: "AIzaSyD6CSmUdL7BfGaa7Pwxtswdw8w07TnjAA",
  authDomain: "ceip-sjo-reservas.firebaseapp.com",
  databaseURL: "https://ceip-sjo-reservas-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ceip-sjo-reservas",
  appId: "1:448340997755:web:995fc7cc6f76215a70d4de"
});
const db = firebase.database();

const INITIAL_RESOURCES = [
  {id:"informatica",name:"Aula de Informática",icon:"🖥️",units:1,color:"#6366f1"},
  {id:"proyector",name:"Proyector Móvil",icon:"📽️",units:1,color:"#f59e0b"}
];

function App() {
  const [reservations, setReservations] = useState({});
  const [modal, setModal] = useState(false);
  const [selected, setSelected] = useState({});

  useEffect(() => {
    db.ref('reservations').on('value', snap => setReservations(snap.val() || {}));
  }, []);

  const createRes = (name) => {
    const key = "test_" + Date.now();
    const newRes = {...reservations, [key]: {name: name || "Prueba", timestamp: Date.now()}};
    db.ref('reservations').set(newRes);
    setModal(false);
  };

  return React.createElement('div', {className:"p-8"}, [
    React.createElement('h1', {className:"text-4xl font-bold text-center mb-4"}, "Reservas CEIP San José Obrero"),
    React.createElement('p', {className:"text-center text-green-600 mb-8"}, "✅ Sincronizado con Firebase"),

    React.createElement('button', {
      onClick: () => setModal(true),
      className: "block mx-auto px-8 py-4 bg-indigo-600 text-white rounded-xl text-lg font-medium"
    }, "Hacer una reserva de prueba"),

    modal && React.createElement('div', {className:"fixed inset-0 bg-black/70 flex items-center justify-center"}, 
      React.createElement('div', {className:"bg-white p-8 rounded-2xl w-96"}, 
        React.createElement('h2', {className:"text-2xl mb-4"}, "Nueva Reserva"),
        React.createElement('input', { 
          type: "text", 
          placeholder: "Nombre de la reserva",
          className: "w-full p-4 border rounded-xl mb-6",
          onKeyDown: e => e.key === "Enter" && createRes(e.target.value)
        }),
        React.createElement('button', {
          onClick: () => createRes("Reserva de prueba"),
          className: "w-full py-4 bg-indigo-600 text-white rounded-xl"
        }, "Guardar")
      )
    )
  ]);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
