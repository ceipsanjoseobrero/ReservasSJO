<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Sistema de Reservas - CEIP San José Obrero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        select, input { font-size: 16px !important; } /* Evita zoom automático en iOS */
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- COMPONENTE DE ICONOS ---
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const IconComponent = lucide.icons[name];
            return IconComponent ? <IconComponent size={size} className={className} /> : null;
        };

        // --- CONSTANTES Y DATOS INICIALES ---
        const PERFILES = [
            "INF 3", "INF 4", "INF 5", 
            "1º Primaria", "2º Primaria", "3º Primaria", 
            "4º Primaria", "5º Primaria", "6º Primaria", 
            "1º ESO", "2º ESO", "Música", "EF", "Religión", "Dirección"
        ];

        const App = () => {
            // --- ESTADO PRINCIPAL ---
            const [view, setView] = useState('user'); // 'user' | 'admin'
            const [reservas, setReservas] = useState([]);
            const [items, setItems] = useState([
                { id: '1', nombre: 'Biblioteca', tipo: 'espacio', cantidadMax: 1, icono: 'DoorOpen' },
                { id: '2', nombre: 'Aula Matinal', tipo: 'espacio', cantidadMax: 1, icono: 'DoorOpen' },
                { id: '3', nombre: 'Sala de Profesores', tipo: 'espacio', cantidadMax: 1, icono: 'Users' },
                { id: '4', nombre: 'Otras Salas', tipo: 'espacio', cantidadMax: 1, icono: 'DoorOpen' },
                { id: '5', nombre: 'Portátiles HP Primaria', tipo: 'recurso', cantidadMax: 25, icono: 'Laptop' },
                { id: '6', nombre: 'Portátiles Táctiles Primaria', tipo: 'recurso', cantidadMax: 15, icono: 'Laptop' },
                { id: '7', nombre: 'Otros Portátiles', tipo: 'recurso', cantidadMax: 10, icono: 'Laptop' }
            ]);

            // --- LÓGICA DE CERRAR SESIÓN ---
            const handleLogout = () => {
                if(window.confirm("¿Seguro que deseas salir del sistema de gestión de Cuevas del Becerro?")) {
                    window.location.reload();
                }
            };

            // --- COMPONENTE CABECERA ---
            const Header = () => (
                <header className="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                        <div className="flex flex-col">
                            <h1 className="text-base md:text-xl font-bold tracking-tight">CEIP San José Obrero</h1>
                            <p className="text-[9px] md:text-xs opacity-80 uppercase tracking-widest font-medium">Cuevas del Becerro</p>
                        </div>
                        
                        <div className="flex items-center gap-1 md:gap-4">
                            <button 
                                onClick={() => setView(view === 'user' ? 'admin' : 'user')}
                                className="flex items-center gap-2 p-2 hover:bg-blue-800 rounded-xl transition-all"
                                title={view === 'user' ? "Administración" : "Volver a Reservas"}
                            >
                                <LucideIcon name={view === 'user' ? "Settings" : "User"} size={20} />
                                <span className="hidden md:block text-sm font-semibold">
                                    {view === 'user' ? "Admin" : "Profesorado"}
                                </span>
                            </button>

                            <div className="w-[1px] h-6 bg-blue-600 mx-1 hidden sm:block"></div>

                            <button 
                                onClick={handleLogout}
                                className="flex items-center gap-2 bg-red-500 hover:bg-red-600 px-3 py-2 rounded-xl transition-all shadow-md active:scale-95 ml-1"
                            >
                                <LucideIcon name="LogOut" size={18} />
                                <span className="hidden xs:block text-xs font-bold uppercase tracking-tighter">Salir</span>
                            </button>
                        </div>
                    </div>
                </header>
            );

            // --- VISTA DE ADMINISTRADOR ---
            const AdminPanel = () => {
                const [newItem, setNewItem] = useState({ nombre: '', tipo: 'espacio', cantidadMax: 1 });

                const handleAddItem = (e) => {
                    e.preventDefault();
                    if (!newItem.nombre) return;
                    setItems([...items, { ...newItem, id: Date.now().toString(), icono: newItem.tipo === 'espacio' ? 'DoorOpen' : 'Laptop' }]);
                    setNewItem({ nombre: '', tipo: 'espacio', cantidadMax: 1 });
                };

                const deleteItem = (id) => {
                    if(confirm("¿Eliminar este recurso permanentemente?")) {
                        setItems(items.filter(i => i.id !== id));
                        setReservas(reservas.filter(r => r.itemId !== id));
                    }
                };

                return (
                    <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <LucideIcon name="ShieldCheck" className="text-red-600" />
                                    Gestión de Inventario y Recursos
                                </h2>
                            </div>
                            
                            <div className="p-6">
                                <form onSubmit={handleAddItem} className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 p-6 bg-blue-50/50 rounded-2xl border border-blue-100">
                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-bold text-blue-700 mb-1 ml-1">NOMBRE DEL ELEMENTO</label>
                                        <input 
                                            type="text" required
                                            className="w-full p-3 bg-white border border-blue-200 rounded-xl outline-none focus:ring-2 ring-blue-500"
                                            placeholder="Ej: Aula de Informática..."
                                            value={newItem.nombre}
                                            onChange={e => setNewItem({...newItem, nombre: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-blue-700 mb-1 ml-1">CATEGORÍA</label>
                                        <select 
                                            className="w-full p-3 bg-white border border-blue-200 rounded-xl outline-none"
                                            value={newItem.tipo}
                                            onChange={e => setNewItem({...newItem, tipo: e.target.value})}
                                        >
                                            <option value="espacio">Espacio</option>
                                            <option value="recurso">Recurso</option>
                                        </select>
                                    </div>
                                    <div className="flex items-end">
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all flex justify-center items-center gap-2 shadow-lg shadow-blue-200">
                                            <LucideIcon name="Plus" size={20} /> AÑADIR
                                        </button>
                                    </div>
                                </form>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.1em]">
                                                <th className="px-4 pb-4">Elemento</th>
                                                <th className="px-4 pb-4">Tipo</th>
                                                <th className="px-4 pb-4">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-slate-700 divide-y divide-slate-100">
                                            {items.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-4 font-semibold">{item.nombre}</td>
                                                    <td className="p-4 uppercase text-[10px]">
                                                        <span className={`px-3 py-1 rounded-full font-bold ${item.tipo === 'espacio' ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700'}`}>
                                                            {item.tipo}
                                                        </span>
                                                    </td>
                                                    <td className="p-4">
                                                        <button onClick={() => deleteItem(item.id)} className="text-slate-300 hover:text-red-500 p-2">
                                                            <LucideIcon name="Trash2" size={18} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- VISTA DE USUARIO (PROFESORADO) ---
            const UserPanel = () => {
                const [form, setForm] = useState({
                    perfil: PERFILES[0],
                    itemId: items[0].id,
                    fecha: new Date().toISOString().split('T')[0],
                    cantidad: 1
                });

                const handleSubmit = (e) => {
                    e.preventDefault();
                    const itemSeleccionado = items.find(i => i.id === form.itemId);
                    
                    const nuevaReserva = {
                        ...form,
                        id: Date.now(),
                        nombreItem: itemSeleccionado.nombre,
                        tipo: itemSeleccionado.tipo,
                        icono: itemSeleccionado.icono
                    };

                    setReservas([nuevaReserva, ...reservas]);
                    alert(`Reserva de "${itemSeleccionado.nombre}" confirmada.`);
                };

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* SECCIÓN FORMULARIO */}
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200">
                                <h2 className="text-xl font-bold text-slate-800 mb-8 flex items-center gap-3">
                                    <div className="bg-green-100 p-2 rounded-lg text-green-600">
                                        <LucideIcon name="PlusCircle" size={24} />
                                    </div>
                                    Nueva Reserva
                                </h2>

                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1 tracking-wider">Solicitante</label>
                                        <select 
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 ring-blue-500/10 focus:bg-white transition-all font-medium"
                                            value={form.perfil}
                                            onChange={e => setForm({...form, perfil: e.target.value})}
                                        >
                                            {PERFILES.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1 tracking-wider">Recurso o Espacio</label>
                                        <select 
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 ring-blue-500/10 focus:bg-white transition-all font-medium"
                                            value={form.itemId}
                                            onChange={e => setForm({...form, itemId: e.target.value})}
                                        >
                                            {items.map(i => <option key={i.id} value={i.id}>{i.nombre}</option>)}
                                        </select>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1 tracking-wider">Fecha</label>
                                            <input 
                                                type="date" required
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 ring-blue-500/10 focus:bg-white transition-all"
                                                value={form.fecha}
                                                onChange={e => setForm({...form, fecha: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1 tracking-wider">Cantidad</label>
                                            <input 
                                                type="number" min="1" max="50"
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 ring-blue-500/10 focus:bg-white transition-all"
                                                value={form.cantidad}
                                                onChange={e => setForm({...form, cantidad: e.target.value})}
                                            />
                                        </div>
                                    </div>

                                    <button 
                                        type="submit"
                                        className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-3 mt-4"
                                    >
                                        <LucideIcon name="Save" size={22} />
                                        RESERVAR AHORA
                                    </button>
                                </form>
                            </section>
                        </div>

                        {/* SECCIÓN LISTADO / CALENDARIO */}
                        <div className="lg:col-span-8">
                            <section className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200 h-full">
                                <div className="flex items-center justify-between mb-8">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-3">
                                        <div className="bg-blue-100 p-2 rounded-lg text-blue-600">
                                            <LucideIcon name="Calendar" size={24} />
                                        </div>
                                        Agenda de Ocupación
                                    </h2>
                                    <span className="text-[10px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full uppercase tracking-widest">En tiempo real</span>
                                </div>

                                <div className="space-y-4 custom-scrollbar overflow-y-auto max-h-[600px] pr-2">
                                    {reservas.length === 0 ? (
                                        <div className="flex flex-col items-center justify-center py-20 text-slate-300">
                                            <LucideIcon name="Clock" size={60} strokeWidth={1} className="opacity-20 mb-4" />
                                            <p className="font-medium italic tracking-tight">No se han registrado reservas todavía</p>
                                        </div>
                                    ) : (
                                        reservas.map(res => (
                                            <div key={res.id} className="group flex items-center justify-between p-5 bg-slate-50 rounded-[1.5rem] border border-slate-100 hover:border-blue-300 hover:bg-white transition-all duration-300">
                                                <div className="flex items-center gap-5">
                                                    <div className={`p-4 rounded-2xl shadow-sm ${res.tipo === 'espacio' ? 'bg-purple-100 text-purple-600' : 'bg-orange-100 text-orange-600'}`}>
                                                        <LucideIcon name={res.icono} size={24} />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-slate-800 text-lg leading-none mb-2">{res.nombreItem}</h4>
                                                        <div className="flex flex-wrap items-center gap-x-4 gap-y-1">
                                                            <div className="flex items-center gap-1.5 text-xs text-blue-600 font-bold bg-blue-50 px-2 py-0.5 rounded-md">
                                                                <LucideIcon name="User" size={12} /> {res.perfil}
                                                            </div>
                                                            <div className="flex items-center gap-1.5 text-xs text-slate-500 font-medium">
                                                                <LucideIcon name="Calendar" size={12} /> {res.fecha}
                                                            </div>
                                                            <div className="flex items-center gap-1.5 text-xs text-slate-500 font-medium">
                                                                <LucideIcon name="Layers" size={12} /> Cant: {res.cantidad}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => setReservas(reservas.filter(r => r.id !== res.id))}
                                                    className="text-slate-300 hover:text-red-500 hover:bg-red-50 p-3 rounded-full transition-all active:scale-90"
                                                >
                                                    <LucideIcon name="X" size={20} />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </section>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    
                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
                        {/* BANNER DINÁMICO */}
                        <div className="mb-10 bg-gradient-to-br from-blue-700 via-blue-800 to-indigo-900 rounded-[2.5rem] p-8 md:p-12 text-white shadow-2xl relative overflow-hidden">
                            <div className="relative z-10">
                                <span className="inline-block bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] mb-4">
                                    Curso Escolar 2025/2026
                                </span>
                                <h2 className="text-3xl md:text-5xl font-black mb-3 tracking-tighter">
                                    Panel de Gestión <br className="hidden md:block" /> Claustro SJO
                                </h2>
                                <p className="text-blue-100 text-sm md:text-lg max-w-xl font-medium opacity-90 leading-relaxed">
                                    Reserva materiales y aulas en Cuevas del Becerro de forma inmediata. 
                                    Optimiza tu tiempo y organiza tus clases con facilidad.
                                </p>
                            </div>
                            <LucideIcon name="Layout" size={240} className="absolute -right-16 -bottom-16 text-white/10 -rotate-12 hidden lg:block" />
                        </div>

                        {/* VISTA CONDICIONAL */}
                        {view === 'user' ? <UserPanel /> : <AdminPanel />}
                    </main>

                    <footer className="py-12 border-t border-slate-200 text-center">
                        <div className="flex justify-center items-center gap-6 mb-4 grayscale opacity-50">
                            {/* Aquí podrían ir logos del centro */}
                        </div>
                        <p className="text-slate-400 text-xs font-bold uppercase tracking-[0.3em]">
                            © CEIP San José Obrero · Cuevas del Becerro
                        </p>
                        <p className="text-slate-300 text-[9px] mt-2 uppercase tracking-widest font-medium">
                            Digitalización del Entorno Educativo
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
